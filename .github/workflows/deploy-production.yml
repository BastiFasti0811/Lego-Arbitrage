name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Lint and build frontend
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Compile backend sources
        working-directory: backend
        run: python -m compileall app

      - name: Validate compose files
        run: |
          trap 'rm -f backend/.env' EXIT
          cp backend/.env.example backend/.env
          docker compose -f docker-compose.yml config > /dev/null
          docker compose --env-file .env.prod.example -f docker-compose.prod.yml config > /dev/null

      - name: Validate Caddy configuration
        run: |
          docker run --rm \
            -v "${PWD}/infra/Caddyfile:/etc/caddy/Caddyfile:ro" \
            caddy:2-alpine \
            caddy validate --config /etc/caddy/Caddyfile

  deploy:
    runs-on: ubuntu-latest
    needs: verify
    environment:
      name: production
      url: ${{ vars.PROD_URL || 'http://178.104.97.121' }}

    steps:
      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Pin production host key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.PROD_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Deploy on Hetzner server
        run: |
          ssh "${{ vars.PROD_USER || 'deploy' }}@${{ vars.PROD_HOST || '178.104.97.121' }}" \
            "cd '${{ vars.PROD_APP_DIR || '/srv/lego-arbitrage' }}' && bash scripts/deploy-prod.sh"
